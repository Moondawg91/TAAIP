<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mission Adjustment Justification Brief</title>
  <link rel="stylesheet" href="mission-adjustment.css" />
</head>
<body>
  <main class="maj-page">
    <header class="maj-page-header">
      <h1>Mission Adjustment Justification Brief</h1>
      <p>Analyze mission feasibility and generate adjustment recommendations for increase, decrease, or hold scenarios.</p>
      <a class="maj-link" href="./index.html">Open Lead Scoring Demo</a>
    </header>

    <section class="maj-form-panel">
      <h2>Generate Decision Output</h2>
      <form id="majForm" class="maj-form">
        <label>Org ID
          <input id="org_id" type="text" required placeholder="1A1" />
        </label>
        <label>Period Start
          <input id="period_start" type="date" required />
        </label>
        <label>Period End
          <input id="period_end" type="date" required />
        </label>
        <label>Baseline Start
          <input id="baseline_start" type="date" />
        </label>
        <label>Baseline End
          <input id="baseline_end" type="date" />
        </label>
        <label class="maj-checkbox">
          <input id="include_evidence" type="checkbox" checked /> Include Evidence
        </label>
        <label class="maj-checkbox">
          <input id="force_refresh" type="checkbox" /> Force Refresh
        </label>
        <div class="maj-actions">
          <button type="submit">Generate One-Slide Brief</button>
          <button id="majPrint" type="button">Print / Export</button>
        </div>
      </form>
      <p id="majStatus" class="maj-status"></p>
    </section>

    <section id="majSlideContainer" class="maj-slide-container"></section>
  </main>
