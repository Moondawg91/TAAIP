version: '3.9'

services:
  backend:
    build:
      context: ./services/api
    working_dir: /app
    command: sh -c "python scripts/runtime_preflight.py --ensure-schema && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      TAAIP_DB_PATH: /app/data/taaip.sqlite3
      DATABASE_URL: sqlite:////app/data/taaip.sqlite3
      TAAIP_UPLOAD_DIR: /app/.data/imports
      TAAIP_REFRESH_UPLOAD_DIR: /app/data/refresh_uploads
      EXPORT_STORAGE_DIR: /app/data/exports
      LOCAL_DEV_AUTH_BYPASS: ${LOCAL_DEV_AUTH_BYPASS:-1}
      TAAIP_MASTER_MODE: ${TAAIP_MASTER_MODE:-1}
    volumes:
      - ./services/api:/app
      - ./data:/app/data
    ports:
      - '8000:8000'

  frontend:
    build:
      context: ./taaip-dashboard
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./taaip-dashboard:/app
    ports:
      - '5173:5173'
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  worker:
    build:
      context: ./services/api
    working_dir: /app
    command: ["python", "-m", "rq", "worker", "default", "--url", "redis://redis:6379/0"]
    environment:
      REDIS_URL: redis://redis:6379/0
      TAAIP_DB_PATH: /app/data/taaip.sqlite3
      DATABASE_URL: sqlite:////app/data/taaip.sqlite3
    volumes:
      - ./services/api:/app
      - ./data:/app/data
    depends_on:
      - backend
      - redis
    restart: unless-stopped
